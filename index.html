<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Utazásaim">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Az Utazásaim</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Unregister old service workers from the vanilla app
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => {
            if (r.active && r.active.scriptURL.includes('/sw.js') && !r.active.scriptURL.includes('workbox')) {
              r.unregister();
              caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
            }
          });
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
